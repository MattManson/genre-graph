name: Deploy Snowflake Objects

on:
  push:
    branches:
      - master
    paths:
      - 'snowflake/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SnowflakeCLI
        run: pip install snowflake-cli-labs

      - name: Configure SnowflakeCLI
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.snowflake
          printf '[connections.default]\naccount = "%s"\nuser = "%s"\npassword = "%s"\nrole = "ACCOUNTADMIN"\nwarehouse = "DSS_WH"\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" "$SNOWFLAKE_PASSWORD" \
            > ~/.snowflake/config.toml
          chmod 0600 ~/.snowflake/config.toml

      - name: Deploy V1 — Infrastructure
        run: snow sql -f snowflake/V1__infrastructure.sql

      - name: Deploy V2 — Raw Tables
        run: snow sql -f snowflake/V2__raw_tables.sql

      - name: Deploy V3 — Dynamic Tables
        run: snow sql -f snowflake/V3__dynamic_tables.sql

      - name: Deploy V4 — Artist Embeddings
        run: snow sql -f snowflake/V4__artist_embeddings.sql

      - name: Deploy V5 — DMFs
        run: snow sql -f snowflake/V5__dmfs.sql