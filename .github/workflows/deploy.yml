name: Deploy Snowflake Objects

on:
  push:
    branches:
      - master
    paths:
      - 'snowflake/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SnowflakeCLI
        run: pip install snowflake-cli-labs

      - name: Deploy V1 — Infrastructure
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          snow sql -f snowflake/V1__infrastructure.sql \
            --account  "$SNOWFLAKE_ACCOUNT" \
            --user     "$SNOWFLAKE_USER" \
            --password "$SNOWFLAKE_PASSWORD" \
            --role     ACCOUNTADMIN \
            --warehouse DSS_WH

      - name: Deploy V2 — Raw Tables
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          snow sql -f snowflake/V2__raw_tables.sql \
            --account  "$SNOWFLAKE_ACCOUNT" \
            --user     "$SNOWFLAKE_USER" \
            --password "$SNOWFLAKE_PASSWORD" \
            --role     ACCOUNTADMIN \
            --warehouse DSS_WH

      - name: Deploy V3 — Dynamic Tables
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          snow sql -f snowflake/V3__dynamic_tables.sql \
            --account  "$SNOWFLAKE_ACCOUNT" \
            --user     "$SNOWFLAKE_USER" \
            --password "$SNOWFLAKE_PASSWORD" \
            --role     ACCOUNTADMIN \
            --warehouse DSS_WH

      - name: Deploy V4 — Artist Embeddings
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          snow sql -f snowflake/V4__artist_embeddings.sql \
            --account  "$SNOWFLAKE_ACCOUNT" \
            --user     "$SNOWFLAKE_USER" \
            --password "$SNOWFLAKE_PASSWORD" \
            --role     ACCOUNTADMIN \
            --warehouse DSS_WH
